server {
    listen 80;
    server_name _;

    # Static resources
    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index  index.html index.htm;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        etag on;
        if_modified_since exact;
        add_header Cache-Control "no-cache";
        add_header Cache-Control "public, max-age=3600";

        sub_filter '@coze-studio/app' 'Kyber Studio';
        sub_filter 'Coze Studio' 'Kyber Studio';
        sub_filter 'Welcome to Coze - Open Source' 'Welcome to Kyber Tech';
        sub_filter 'Welcome to Coze' 'Welcome to Kyber Tech';
        sub_filter 'open source license' 'Kyber Tech terms';
        sub_filter 'Open Source' 'Self-hosted';
        sub_filter '扣子-开源版' 'Kyber Tech';
        sub_filter '开源版' '自托管版';
        sub_filter '扣子' 'Kyber Tech';
        sub_filter 'open-source version' 'self-hosted edition';
        sub_filter 'open source version' 'self-hosted edition';
        sub_filter '</head>' '<style id="kyber-brand-overrides">[class*="coze-brand"] svg{display:none!important}[class*="coze-brand"]{display:inline-flex!important;align-items:center!important;gap:8px!important;height:32px!important}[class*="coze-brand"]::before{content:"KT";display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2dd4bf,#4f46e5);color:#fff;font-size:13px;font-weight:700}[class*="coze-brand"]::after{content:"Kyber Tech";color:#111827;font-size:18px;font-weight:700;line-height:24px}</style></head>';
        sub_filter_once off;
        sub_filter_types 'text/html' 'application/javascript' 'text/javascript';
    }

    # API proxy
    location ~ ^/(api|v[1-3]|admin)(/|$) {
        proxy_pass http://coze-server:8888;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings
        proxy_connect_timeout 60s;        # Connection timeout to upstream
        proxy_send_timeout 60s;           # Timeout for sending data to upstream
        proxy_read_timeout 600s;         # Timeout for reading response from upstream (600s for SSE)
        
        
        # SSL/TLS settings
        proxy_ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;


        sub_filter ':8889' ':8888/local_storage';
        sub_filter 'minio:9000' '$http_host/local_storage';
        sub_filter 'Coze Studio' 'Kyber Studio';
        sub_filter 'Welcome to Coze - Open Source' 'Welcome to Kyber Tech';
        sub_filter 'Welcome to Coze' 'Welcome to Kyber Tech';
        sub_filter 'open source license' 'Kyber Tech terms';
        sub_filter 'Open Source' 'Self-hosted';
        sub_filter '扣子-开源版' 'Kyber Tech';
        sub_filter '开源版' '自托管版';
        sub_filter '扣子' 'Kyber Tech';
        sub_filter 'open-source version' 'self-hosted edition';
        sub_filter 'open source version' 'self-hosted edition';
        sub_filter 'Coze Official' 'Kyber Official';
        sub_filter 'Coze Community' 'Kyber Community';
        sub_filter_once off;
        sub_filter_types 'application/json' 'text/event-stream' 'application/javascript' 'text/javascript';
    }

    location /local_storage/ {
        if ($args ~* "(^|.*&)x-wf-file_name=[^&]*(&.*|$)") {
            set $args $1$2;
        }
        if ($args ~* "^x-wf-file_name=[^&]*$") {
            set $args "";
        }

        rewrite ^/local_storage/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
    }
}

