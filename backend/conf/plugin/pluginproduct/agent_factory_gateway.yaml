openapi: 3.0.1
info:
  title: Agent Factory Gateway
  description: Governed access to Agent Factory MCP tools. This file is generated from contracts/mcp-tools.yaml; do not edit
    by hand.
  version: v0.1.0
servers:
- url: http://host.docker.internal:8200
paths:
  /api/tools/invoke/{tool_name}:
    post:
      operationId: invoke_agent_factory_tool
      summary: Invoke an Agent Factory governed tool
      description: Invoke a selected MCP tool through Agent Factory Gateway. Gateway policy, approval, audit, idempotency,
        and trace capture are enforced before side effects execute.
      parameters:
      - name: tool_name
        in: path
        required: true
        description: Tool name from contracts/mcp-tools.yaml.
        schema:
          type: string
          enum:
          - assessment.generate_test
          - assessment.score_resume_match
          - assessment.score_submission
          - iam.check_permission_scope
          - iam.lookup_user
          - iam.lookup_user_roles
          - knowledge.get_doc
          - knowledge.search_policy
          - offertoday.get_candidate_profile
          - offertoday.import_candidates
          - offertoday.update_candidate_status
          - ticket.create_ticket
          - ticket.get_ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayToolInvokeRequest'
      responses:
        '200':
          description: Gateway decision and optional tool result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayToolInvokeResponse'
        '403':
          description: Tool call blocked by policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayToolInvokeResponse'
        '422':
          description: Tool input failed contract validation.
        default:
          description: Gateway error response.
components:
  schemas:
    GatewayToolInvokeRequest:
      type: object
      description: Flat Kyber Tech-friendly request body. Provide only the fields required by the selected tool_name; extra tool-specific
        fields are passed through to the Gateway.
      properties:
        agent_id:
          type: string
          description: Logical Kyber Tech agent id. Defaults to kyber-agent if omitted by the caller. Reserved by Agent Factory Gateway.
          default: kyber-agent
        agent_version:
          type: string
          description: Logical Kyber Tech agent version. Reserved by Agent Factory Gateway.
          default: 0.1.0
        approval_required:
          type: boolean
          description: 'Used by: ticket.create_ticket.'
        audit_metadata:
          type: object
          additionalProperties: true
          description: 'Used by: assessment.generate_test, offertoday.update_candidate_status, ticket.create_ticket.'
        candidate_id:
          type: string
          description: 'Used by: assessment.generate_test, assessment.score_submission, offertoday.get_candidate_profile,
            offertoday.update_candidate_status.'
        candidates:
          type: array
          items:
            type: object
            additionalProperties: true
          description: 'Used by: assessment.score_resume_match.'
        category:
          type: string
          enum:
          - permission_request
          - it_support
          description: 'Used by: ticket.create_ticket.'
        description:
          type: string
          description: 'Used by: ticket.create_ticket.'
        doc_id:
          type: string
          description: 'Used by: knowledge.get_doc.'
        dry_run:
          type: boolean
          description: 'Used by: assessment.generate_test, offertoday.update_candidate_status, ticket.create_ticket. Reserved
            by Agent Factory Gateway.'
        execution_mode:
          type: string
          description: Execution mode used by Agent Factory policy rules. Reserved by Agent Factory Gateway.
          enum:
          - autonomous
          - workflow
          default: autonomous
        idempotency_key:
          type: string
          description: 'Used by: assessment.generate_test, offertoday.update_candidate_status, ticket.create_ticket. Reserved
            by Agent Factory Gateway.'
        job:
          type: object
          additionalProperties: true
          description: 'Used by: assessment.score_resume_match.'
        job_id:
          type: string
          description: 'Used by: assessment.generate_test, offertoday.import_candidates.'
        permission_type:
          type: string
          description: 'Used by: iam.check_permission_scope, knowledge.search_policy, ticket.create_ticket.'
        query:
          type: string
          description: 'Used by: knowledge.search_policy.'
        risk_level:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          description: 'Used by: ticket.create_ticket.'
        status:
          type: string
          enum:
          - screened
          - shortlisted
          - assessment_sent
          - interview_invited
          - rejected
          - hold
          description: 'Used by: offertoday.update_candidate_status.'
        submission_text:
          type: string
          description: 'Used by: assessment.score_submission.'
        target_system:
          type: string
          description: 'Used by: iam.check_permission_scope, knowledge.search_policy, ticket.create_ticket.'
        ticket_id:
          type: string
          description: 'Used by: ticket.get_ticket.'
        title:
          type: string
          description: 'Used by: ticket.create_ticket.'
        trace_id:
          type: string
          description: Optional upstream trace id to join Kyber Tech, Agent Factory, and Langfuse evidence. Reserved by Agent Factory
            Gateway.
        user_context:
          type: object
          additionalProperties: true
          description: 'Used by: knowledge.get_doc, knowledge.search_policy.'
        user_id:
          type: string
          description: 'Used by: iam.check_permission_scope, iam.lookup_user, iam.lookup_user_roles, ticket.create_ticket.'
      additionalProperties: true
    GatewayToolInvokeResponse:
      type: object
      properties:
        decision:
          type: string
          enum:
          - allowed
          - approval_required
          - blocked
          description: Gateway policy decision for this tool call.
        tool_name:
          type: string
        result:
          type: object
          additionalProperties: true
          description: Tool result when the call is allowed and executed.
        tool_result:
          type: object
          additionalProperties: true
          description: Raw tool result from the MCP server when present.
        message:
          type: string
        approval_id:
          type: string
          description: Approval identifier when decision is approval_required.
        approval_run_id:
          type: string
          description: Agent Factory approval run id for pending approval bridge flows.
        status_url:
          type: string
        audit_id:
          type: string
          description: Agent Factory audit event id.
        trace_id:
          type: string
          description: Agent Factory trace id.
        reason:
          type: string
        allow:
          type: boolean
        approval_required:
          type: boolean
        cached:
          type: boolean
        latency_ms:
          type: integer
      required:
      - decision
      additionalProperties: true
x-agent-factory:
  contract: contracts/mcp-tools.yaml
  contractVersion: 0.1.0
  toolCount: 13
  tools:
  - name: assessment.generate_test
    server: assessment-mcp-server
    riskLevel: medium
    sideEffect: write
    approvalRequired: conditional
    description: Generate a mock frontend assessment draft for HR review. It does not send email.
  - name: assessment.score_resume_match
    server: assessment-mcp-server
    riskLevel: medium
    sideEffect: none
    approvalRequired: false
    description: Score mock candidates against a job profile. Advisory only; HR review required.
  - name: assessment.score_submission
    server: assessment-mcp-server
    riskLevel: medium
    sideEffect: none
    approvalRequired: false
    description: Score a mock assessment submission for HR review.
  - name: iam.check_permission_scope
    server: iam-mcp-server
    riskLevel: medium
    sideEffect: none
    approvalRequired: false
    description: 检查用户是否具备目标系统和权限类型的申请范围。
  - name: iam.lookup_user
    server: iam-mcp-server
    riskLevel: low
    sideEffect: none
    approvalRequired: false
    description: 查询用户基础信息、部门、角色、manager 和数据权限范围。
  - name: iam.lookup_user_roles
    server: iam-mcp-server
    riskLevel: low
    sideEffect: none
    approvalRequired: false
    description: 查询用户角色。
  - name: knowledge.get_doc
    server: knowledge-mcp-server
    riskLevel: low
    sideEffect: none
    approvalRequired: false
    description: 根据 doc_id 获取知识文档片段。
  - name: knowledge.search_policy
    server: knowledge-mcp-server
    riskLevel: low
    sideEffect: none
    approvalRequired: false
    description: 根据用户上下文检索权限政策文档，返回政策摘要、引用和风险判断依据。
  - name: offertoday.get_candidate_profile
    server: offertoday-mcp-server
    riskLevel: medium
    sideEffect: none
    approvalRequired: false
    description: Get one mock OfferToday candidate profile and resume text for screening.
  - name: offertoday.import_candidates
    server: offertoday-mcp-server
    riskLevel: low
    sideEffect: none
    approvalRequired: false
    description: Import mock OfferToday applicants for one job. Read-only in MVP.
  - name: offertoday.update_candidate_status
    server: offertoday-mcp-server
    riskLevel: high
    sideEffect: write
    approvalRequired: conditional
    description: Prepare a mock OfferToday candidate status update. Production writes require approval.
  - name: ticket.create_ticket
    server: ticket-mcp-server
    riskLevel: medium
    sideEffect: write
    approvalRequired: conditional
    description: 创建权限申请或 IT 工单。所有写操作必须带 dry_run 和 idempotency_key。
  - name: ticket.get_ticket
    server: ticket-mcp-server
    riskLevel: low
    sideEffect: none
    approvalRequired: false
    description: 查询工单状态。
